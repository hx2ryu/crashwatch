name: dist-tag-cleanup

# One-shot utility: realigns the stray `latest` dist-tag on the 7 alpha
# packages so it points at the current alpha version instead of 0.1.0-alpha.0.
# npm autopopulates `latest` on first publish even when `--tag alpha` is
# passed, and refuses a bare `npm dist-tag rm ... latest` (every package must
# carry a `latest`), so we re-point rather than delete. Run via
# workflow_dispatch, passing the target version as input.

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Version to repoint `latest` at (e.g. 0.1.0-alpha.5)'
        required: true
        default: '0.1.0-alpha.5'

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Repoint latest dist-tag on every package
        run: |
          set -e
          for pkg in \
            core \
            cli \
            provider-firebase \
            provider-sentry \
            notifier-webhook \
            notifier-slack \
            tracker-github-issues; do
            full="@hx2ryu/crashwatch-$pkg"
            echo "--- $full ---"
            npm dist-tag ls "$full"
            npm dist-tag add "$full@${{ inputs.target_version }}" latest
            echo "after:"
            npm dist-tag ls "$full"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
