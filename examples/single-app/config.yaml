# Minimal example: one app, Firebase Crashlytics, Slack-compatible webhook.
# Replace identifiers with your own. See ../../docs/configuration.md.

version: 1

defaults:
  thresholds:
    regressionPct: 20
    newIssueEvents24h: 5
    regressionSignals: [SIGNAL_REGRESSED, SIGNAL_EARLY]

providers:
  - id: firebase
    plugin: "@crashwatch/provider-firebase"
    options:
      projectId: "my-gcp-project"
      credentials: "${GOOGLE_APPLICATION_CREDENTIALS}"
      defaultWindowHours: 24

notifiers:
  - id: slack
    plugin: "@crashwatch/notifier-webhook"
    options:
      url: "${SLACK_WEBHOOK_URL}"
      bodyTemplate: slack-incoming-webhook

apps:
  - name: example-app
    displayName: "Example App"
    platforms:
      android:
        providerOptions:
          bigqueryTable: "my-gcp-project.firebase_crashlytics.example_app_ANDROID"
      ios:
        providerOptions:
          bigqueryTable: "my-gcp-project.firebase_crashlytics.example_app_IOS"
    providers: [firebase]
    notify: [slack]
