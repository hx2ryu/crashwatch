# Minimal example: one app, Firebase Crashlytics OR Sentry, Slack-compatible webhook.
# Pick one of the two providers blocks and delete the other — both are shown
# side-by-side for reference. Replace identifiers with your own. See
# ../../docs/configuration.md.

version: 1

defaults:
  thresholds:
    regressionPct: 20
    newIssueEvents24h: 5
    regressionSignals: [SIGNAL_REGRESSED, SIGNAL_EARLY]

providers:
  # -- Firebase Crashlytics (BigQuery export) --
  - id: firebase
    plugin: "@crashwatch/provider-firebase"
    options:
      projectId: "my-gcp-project"
      credentials: "${GOOGLE_APPLICATION_CREDENTIALS}"
      defaultWindowHours: 24

  # -- Sentry (REST API) --
  - id: sentry
    plugin: "@crashwatch/provider-sentry"
    options:
      authToken: "${SENTRY_AUTH_TOKEN}"
      org: "my-org"
      defaultProject: "web-frontend"
      defaultWindowHours: 24

notifiers:
  - id: slack
    plugin: "@crashwatch/notifier-webhook"
    options:
      url: "${SLACK_WEBHOOK_URL}"
      bodyTemplate: slack-incoming-webhook

apps:
  # Firebase-backed app
  - name: example-firebase-app
    displayName: "Example App (Firebase)"
    platforms:
      android:
        providerOptions:
          bigqueryTable: "my-gcp-project.firebase_crashlytics.example_app_ANDROID"
      ios:
        providerOptions:
          bigqueryTable: "my-gcp-project.firebase_crashlytics.example_app_IOS"
    providers: [firebase]
    notify: [slack]

  # Sentry-backed app
  - name: example-sentry-app
    displayName: "Example App (Sentry)"
    platforms:
      android:
        providerOptions:
          project: "mobile-android"
          environment: "production"
      ios:
        providerOptions:
          project: "mobile-ios"
          environment: "production"
    providers: [sentry]
    notify: [slack]
